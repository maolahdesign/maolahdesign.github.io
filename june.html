<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>隨機抽名單</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.2);
    --text-primary: #1a1a1a;
    --text-secondary: #666;
    --text-tertiary: #999;
    --accent: #2d5be3;
    --accent-bg: #eef1fc;
    --success: #1a7a4a;
    --success-bg: #edfaf3;
    --warn: #a05c00;
    --warn-bg: #fff7e6;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
  }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem 4rem;
    color: var(--text-primary);
  }

  .container {
    width: 100%;
    max-width: 520px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 2rem;
  }
  .header h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }
  .header p {
    font-size: 14px;
    color: var(--text-secondary);
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    margin-bottom: 1rem;
  }

  /* Input row */
  .input-section { margin-bottom: 1.5rem; }
  .input-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 8px;
    display: block;
  }
  .input-row {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }
  .num-input {
    width: 90px;
    text-align: center;
    font-size: 18px;
    font-weight: 500;
    font-family: 'Noto Sans TC', sans-serif;
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius-sm);
    padding: 10px;
    background: var(--bg);
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .num-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(45,91,227,0.12);
  }
  .num-input::-webkit-inner-spin-button,
  .num-input::-webkit-outer-spin-button { opacity: 1; }

  .btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px 16px;
    font-size: 15px;
    font-weight: 500;
    font-family: 'Noto Sans TC', sans-serif;
    border-radius: var(--radius-sm);
    cursor: pointer;
    border: none;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { opacity: 0.88; }
  .btn-reset {
    background: var(--bg);
    color: var(--text-secondary);
    border: 0.5px solid var(--border-strong);
    padding: 10px 14px;
    flex: none;
    font-size: 14px;
  }
  .btn-reset:hover { background: #ebe9e4; }

  /* Error */
  .err {
    font-size: 13px;
    color: #c0392b;
    margin-top: 8px;
    min-height: 20px;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 1rem;
  }
  .stat-pill {
    flex: 1;
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    text-align: center;
  }
  .stat-pill .val {
    font-size: 20px;
    font-weight: 700;
    color: var(--text-primary);
    display: block;
    line-height: 1.2;
  }
  .stat-pill .lbl {
    font-size: 11px;
    color: var(--text-tertiary);
    margin-top: 2px;
    display: block;
  }

  /* Results */
  .results-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 10px;
  }
  .results-list { display: flex; flex-direction: column; gap: 8px; }

  .winner-card {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--success-bg);
    border: 0.5px solid rgba(26,122,74,0.2);
    border-radius: var(--radius-md);
    padding: 12px 14px;
    animation: fadeUp 0.3s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 700;
    flex-shrink: 0;
    background: rgba(26,122,74,0.15);
    color: var(--success);
  }
  .winner-info { flex: 1; min-width: 0; }
  .winner-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
  }
  .winner-id {
    font-size: 12px;
    color: var(--text-secondary);
    font-variant-numeric: tabular-nums;
    margin-top: 2px;
    letter-spacing: 0.3px;
  }
  .rank-badge {
    font-size: 12px;
    font-weight: 500;
    color: var(--success);
    background: rgba(26,122,74,0.1);
    border-radius: 20px;
    padding: 3px 10px;
    white-space: nowrap;
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 2.5rem 0;
    color: var(--text-tertiary);
    font-size: 14px;
  }
  .empty svg { display: block; margin: 0 auto 12px; opacity: 0.3; }

  /* History toggle */
  .history-toggle {
    background: none;
    border: none;
    font-size: 13px;
    color: var(--text-secondary);
    cursor: pointer;
    padding: 4px 0;
    text-decoration: underline;
    font-family: 'Noto Sans TC', sans-serif;
  }
  .history-toggle:hover { color: var(--text-primary); }
  .history-section { margin-top: 1rem; }
  .history-header {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-tertiary);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .history-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .history-chip {
    font-size: 12px;
    background: #ebe9e4;
    border-radius: 20px;
    padding: 4px 10px;
    color: var(--text-secondary);
    white-space: nowrap;
  }

  @media (max-width: 400px) {
    .header h1 { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>🎲 隨機抽名單</h1>
    <p>共 44 位學員，輸入人數後開始抽籤</p>
  </div>

  <div class="card">
    <div class="input-section">
      <label class="input-label" for="count">抽取人數</label>
      <div class="input-row">
        <input type="number" id="count" class="num-input" min="1" max="44" value="1" step="1" />
        <button class="btn btn-primary" onclick="doDraw()">
          &#9654; 開始抽籤
        </button>
        <button class="btn btn-reset" onclick="resetDraw()" title="重置所有紀錄">↺ 重置</button>
      </div>
      <div class="err" id="err" aria-live="polite"></div>
    </div>

    <div class="stats-bar">
      <div class="stat-pill">
        <span class="val" id="stat-total">44</span>
        <span class="lbl">總人數</span>
      </div>
      <div class="stat-pill">
        <span class="val" id="stat-drawn">0</span>
        <span class="lbl">已抽出</span>
      </div>
      <div class="stat-pill">
        <span class="val" id="stat-remain">44</span>
        <span class="lbl">剩餘</span>
      </div>
    </div>

    <div id="results-area">
      <div class="empty">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="7" width="20" height="14" rx="2"/>
          <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
          <line x1="12" y1="12" x2="12" y2="16"/>
          <line x1="10" y1="14" x2="14" y2="14"/>
        </svg>
        按下「開始抽籤」以隨機抽出名單
      </div>
    </div>
  </div>

  <div id="history-wrapper" style="display:none;">
    <div class="card">
      <div class="history-header">已抽出名單</div>
      <div class="history-grid" id="history-grid"></div>
    </div>
  </div>

</div>

<script>
const ALL = [
  {id:"101612140",name:"廖岫湘"},{id:"106107171",name:"張世明"},{id:"101167097",name:"蕭桂枝"},
  {id:"106037227",name:"吳婕如"},{id:"106136725",name:"游曜誠"},{id:"106369135",name:"黃晴"},
  {id:"105600388",name:"林念群"},{id:"106130778",name:"汪莉蓁"},{id:"106146285",name:"趙家弘"},
  {id:"106413745",name:"許順宗"},{id:"105790725",name:"黃婉婷"},{id:"106352792",name:"王來"},
  {id:"106266193",name:"林孟蓉"},{id:"105801198",name:"陳恩瑩"},{id:"106138774",name:"周杰叡"},
  {id:"106398887",name:"郭展夆"},{id:"106416406",name:"王韋紘"},{id:"101045470",name:"廖素鈴"},
  {id:"100226917",name:"楊琇荃"},{id:"106373228",name:"呂安珩"},{id:"106391860",name:"戴財富"},
  {id:"106390685",name:"許毓峻"},{id:"106364630",name:"葉朝宗"},{id:"106389879",name:"利木成"},
  {id:"105744125",name:"吳沛璇"},{id:"106373184",name:"張家旗"},{id:"105957953",name:"許愷文"},
  {id:"105379897",name:"蕭仲斌"},{id:"104818242",name:"郭宣妤"},{id:"106380661",name:"馬純育"},
  {id:"105397377",name:"胡良奇"},{id:"106029645",name:"周碧玲"},{id:"106386305",name:"黃品甄"},
  {id:"106406375",name:"宗昀徹"},{id:"106000060",name:"邱冠傑"},{id:"105304890",name:"薛羽亨"},
  {id:"106357313",name:"黃慈瑾"},{id:"106036186",name:"蔡佳淳"},{id:"105307426",name:"林彩霞"},
  {id:"105395266",name:"吳柏賢"},{id:"106161826",name:"黃瀞瑩"},{id:"101555800",name:"紀威宇"},
  {id:"106308392",name:"吳宇心"},{id:"106225076",name:"張心喻"}
];

let drawnIds = new Set();
let allDrawn = [];

function doDraw() {
  const errEl = document.getElementById("err");
  const n = parseInt(document.getElementById("count").value, 10);
  errEl.textContent = "";

  if (isNaN(n) || n < 1) { errEl.textContent = "請輸入至少 1 人"; return; }
  const pool = ALL.filter(p => !drawnIds.has(p.id));
  if (n > pool.length) {
    errEl.textContent = "剩餘可抽人數為 " + pool.length + " 人，請調整人數";
    return;
  }

  const picked = [];
  const usedIdx = new Set();
  while (picked.length < n) {
    const r = Math.floor(Math.random() * pool.length);
    if (!usedIdx.has(r)) { usedIdx.add(r); picked.push(pool[r]); }
  }
  picked.forEach(p => { drawnIds.add(p.id); allDrawn.push(p); });
  renderResults(picked);
  updateStats();
  updateHistory();
}

function renderResults(picked) {
  const area = document.getElementById("results-area");
  if (!picked.length) { area.innerHTML = emptyHTML(); return; }
  const label = "本次抽出 " + picked.length + " 人";
  area.innerHTML =
    '<p class="results-label">' + label + '</p>' +
    '<div class="results-list">' +
    picked.map((p, i) =>
      '<div class="winner-card" style="animation-delay:' + (i * 0.06) + 's">' +
        '<div class="avatar">' + p.name[0] + '</div>' +
        '<div class="winner-info">' +
          '<div class="winner-name">' + p.name + '</div>' +
          '<div class="winner-id">' + p.id + '</div>' +
        '</div>' +
        '<span class="rank-badge">#' + (i + 1) + '</span>' +
      '</div>'
    ).join("") +
    '</div>';
}

function updateStats() {
  document.getElementById("stat-drawn").textContent = drawnIds.size;
  document.getElementById("stat-remain").textContent = ALL.length - drawnIds.size;
}

function updateHistory() {
  const wrapper = document.getElementById("history-wrapper");
  const grid = document.getElementById("history-grid");
  if (allDrawn.length === 0) { wrapper.style.display = "none"; return; }
  wrapper.style.display = "block";
  grid.innerHTML = allDrawn.map(p =>
    '<span class="history-chip">' + p.name + ' <span style="opacity:0.6;font-size:11px">' + p.id + '</span></span>'
  ).join("");
}

function emptyHTML() {
  return '<div class="empty">' +
    '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">' +
    '<rect x="2" y="7" width="20" height="14" rx="2"/>' +
    '<path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>' +
    '<line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/>' +
    '</svg>按下「開始抽籤」以隨機抽出名單</div>';
}

function resetDraw() {
  drawnIds.clear();
  allDrawn = [];
  document.getElementById("results-area").innerHTML = emptyHTML();
  document.getElementById("err").textContent = "";
  document.getElementById("count").value = 1;
  document.getElementById("history-wrapper").style.display = "none";
  updateStats();
}
</script>
</body>
</html>
