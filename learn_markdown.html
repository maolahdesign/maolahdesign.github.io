  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 line-height: 1.75; }\n    ::-webkit-scrollbar { width: 4px; }\n    ::-webkit-scrollbar-thumb { background: #C8C0B4; border-radius: 2px; }\n    pre { white-space: pre; overflow-x: auto; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"display:flex; min-height:100vh;\">\n\n  <!-- Sidebar -->\n  <nav style=\"position:fixed; top:0; left:0; width:240px; height:100vh; overflow-y:auto; background:#F0EDE6; border-right:1px solid #DDD8D0; padding:36px 24px; z-index:100; display:flex; flex-direction:column;\">\n\n    <div style=\"margin-bottom:36px;\">\n      <div style=\"font-family: 'Lora',serif; font-size: 18px; font-weight: 700; color: #1A1714; letter-spacing: -0.01em; margin-bottom: 3px\">Markdown 教學<\u002Fdiv>\n      <div style=\"font-size:11.5px; color:#9B8E82; letter-spacing:0.02em;\">完整語法指南<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:#B0A496; margin-bottom:10px;\">目錄<\u002Fdiv>\n\n    <div style=\"display:flex; flex-direction:column; gap:1px;\">\n      <a href=\"#intro\" style=\"display:block; padding:6px 10px; border-radius:4px; font-size:13px; color:#5C4F44; text-decoration:none;\" style-hover=\"background:#E4DFD7; color:#1A1714;\">簡介<\u002Fa>\n      <a href=\"#headings\" style=\"display:block; padding:6px 10px; border-radius:4px; font-size:13px; color:#5C4F44; text-decoration:none;\" style-hover=\"background:#E4DFD7; color:#1A1714;\">標題<\u002Fa>\n      <a href=\"#format\" style=\"display:block; padding:6px 10px; border-radius:4px; font-size:13px; color:#5C4F44; text-decoration:none;\" style-hover=\"background:#E4DFD7; color:#1A1714;\">文字格式<\u002Fa>\n      <a href=\"#blockquote\" style=\"display:block; padding:6px 10px; border-radius:4px; font-size:13px; color:#5C4F44; text-decoration:none;\" style-hover=\"background:#E4DFD7; color:#1A1714;\">引文<\u002Fa>\n      <a href=\"#lists\" style=\"display:block; padding:6px 10px; border-radius:4px; font-size:13px; color:#5C4F44; text-decoration:none;\" style-hover=\"background:#E4DFD7; color:#1A1714;\">清單<\u002Fa>\n      <a href=\"#code\" style=\"display:block; padding:6px 10px; border-radius:4px; font-size:13px; color:#5C4F44; text-decoration:none;\" style-hover=\"background:#E4DFD7; color:#1A1714;\">程式碼<\u002Fa>\n      <a href=\"#links\" style=\"display:block; padding:6px 10px; border-radius:4px; font-size:13px; color:#5C4F44; text-decoration:none;\" style-hover=\"background:#E4DFD7; color:#1A1714;\">連結<\u002Fa>\n      <a href=\"#images\" style=\"display:block; padding:6px 10px; border-radius:4px; font-size:13px; color:#5C4F44; text-decoration:none;\" style-hover=\"background:#E4DFD7; color:#1A1714;\">圖片<\u002Fa>\n      <a href=\"#tables\" style=\"display:block; padding:6px 10px; border-radius:4px; font-size:13px; color:#5C4F44; text-decoration:none;\" style-hover=\"background:#E4DFD7; color:#1A1714;\">表格<\u002Fa>\n      <a href=\"#checkbox\" style=\"display:block; padding:6px 10px; border-radius:4px; font-size:13px; color:#5C4F44; text-decoration:none;\" style-hover=\"background:#E4DFD7; color:#1A1714;\">任務清單<\u002Fa>\n      <a href=\"#hr\" style=\"display:block; padding:6px 10px; border-radius:4px; font-size:13px; color:#5C4F44; text-decoration:none;\" style-hover=\"background:#E4DFD7; color:#1A1714;\">分隔線<\u002Fa>\n      <a href=\"#escape\" style=\"display:block; padding:6px 10px; border-radius:4px; font-size:13px; color:#5C4F44; text-decoration:none;\" style-hover=\"background:#E4DFD7; color:#1A1714;\">跳脫字元<\u002Fa>\n      <a href=\"#math\" style=\"display:block; padding:6px 10px; border-radius:4px; font-size:13px; color:#5C4F44; text-decoration:none;\" style-hover=\"background:#E4DFD7; color:#1A1714;\">數學公式<\u002Fa>\n    <\u002Fdiv>\n\n\n  <\u002Fnav>\n\n  <!-- Main -->\n  <main style=\"margin-left:240px; flex:1; padding:80px 88px 120px; max-width:960px;\">\n\n    <!-- Hero -->\n    <div style=\"margin-bottom:88px; padding-bottom:64px; border-bottom:1px solid #DDD8D0;\">\n      <div style=\"font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.12em; color:#C8614A; margin-bottom:20px;\">Markdown 完整指南<\u002Fdiv>\n      <h1 style=\"font-family:'Lora',serif; font-size:48px; font-weight:700; line-height:1.1; color:#1A1714; margin-bottom:20px; letter-spacing:-0.025em;\">從入門到進階<br>的 Markdown 語法<\u002Fh1>\n      <p style=\"font-size:18px; color:#5C4F44; max-width:480px; line-height:1.85; font-weight:300;\">涵蓋標題、清單、表格、程式碼、數學公式等所有常用語法，適合各類寫作場景——從技術文件到個人筆記。<\u002Fp>\n\n    <\u002Fdiv>\n\n    <!-- ── 簡介 ── -->\n    <section id=\"intro\" style=\"margin-bottom:72px;\">\n      <div style=\"font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:#C8614A; margin-bottom:12px;\">01<\u002Fdiv>\n      <h2 style=\"font-family:'Lora',serif; font-size:28px; font-weight:700; color:#1A1714; margin-bottom:16px; letter-spacing:-0.015em;\">簡介<\u002Fh2>\n      <p style=\"font-size:18px; color:#4A3F36; margin-bottom:20px; line-height:1.85;\">Markdown 由 John Gruber 於 2004 年創建，設計理念是讓文件原始碼具備良好的可讀性，同時能轉換為結構化的 HTML。它是目前最廣泛使用的輕量級標記語言。<\u002Fp>\n      <div style=\"background:#EDE9E1; border-radius:6px; padding:18px 22px;\">\n        <div style=\"font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:#8B7F72; margin-bottom:8px;\">主要使用平台<\u002Fdiv>\n        <p style=\"font-size:14px; color:#4A3F36;\">GitHub、GitLab、Notion、HackMD、Obsidian、Jupyter Notebook、各類靜態網站生成器。<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ── 標題 ── -->\n    <section id=\"headings\" style=\"margin-bottom:72px;\">\n      <div style=\"font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:#C8614A; margin-bottom:12px;\">02<\u002Fdiv>\n      <h2 style=\"font-family:'Lora',serif; font-size:28px; font-weight:700; color:#1A1714; margin-bottom:16px; letter-spacing:-0.015em;\">標題<\u002Fh2>\n      <p style=\"font-size:18px; color:#4A3F36; margin-bottom:20px; line-height:1.85;\">使用 <code style=\"background:#EDE9E1; padding:1px 6px; border-radius:3px; font-family:'JetBrains Mono',monospace; font-size:13px;\">#<\u002Fcode> 符號定義標題層級，H1 至 H6 共六個層級，<code style=\"background:#EDE9E1; padding:1px 6px; border-radius:3px; font-family:'JetBrains Mono',monospace; font-size:13px;\">#<\u002Fcode> 的數量對應層級數。<\u002Fp>\n      <div style=\"background:#1A1714; border-radius:8px; padding:24px 28px; margin-bottom:12px;\">\n        <div style=\"font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:#5C5248; margin-bottom:14px;\">語法<\u002Fdiv>\n        <pre style=\"font-family:'JetBrains Mono',monospace; font-size:13.5px; line-height:1.9; color:#E8E0D4;\"><span style=\"color:#C8614A;\"># <\u002Fspan>H1 主標題\n<span style=\"color:#C8614A;\">## <\u002Fspan>H2 次標題\n<span style=\"color:#C8614A;\">### <\u002Fspan>H3 三級標題\n<span style=\"color:#C8614A;\">#### <\u002Fspan>H4 四級標題<\u002Fpre>\n      <\u002Fdiv>\n      <div style=\"border:1px solid #DDD8D0; border-radius:8px; padding:24px 28px; background:#fff;\">\n        <div style=\"font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:#B0A496; margin-bottom:16px;\">渲染結果<\u002Fdiv>\n        <div style=\"font-family:'Lora',serif; font-size:30px; font-weight:700; color:#1A1714; margin-bottom:10px; line-height:1;\">H1 主標題<\u002Fdiv>\n        <div style=\"font-family:'Lora',serif; font-size:23px; font-weight:700; color:#1A1714; margin-bottom:8px; line-height:1;\">H2 次標題<\u002Fdiv>\n        <div style=\"font-family:'Lora',serif; font-size:18px; font-weight:600; color:#1A1714; margin-bottom:6px;\">H3 三級標題<\u002Fdiv>\n        <div style=\"font-size:15px; font-weight:600; color:#1A1714;\">H4 四級標題<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ── 文字格式 ── -->\n    <section id=\"format\" style=\"margin-bottom:72px;\">\n      <div style=\"font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:#C8614A; margin-bottom:12px;\">03<\u002Fdiv>\n      <h2 style=\"font-family:'Lora',serif; font-size:28px; font-weight:700; color:#1A1714; margin-bottom:16px; letter-spacing:-0.015em;\">文字格式<\u002Fh2>\n      <p style=\"font-size:18px; color:#4A3F36; margin-bottom:20px; line-height:1.85;\">以符號包圍文字套用粗體、斜體、刪除線與行內程式碼等格式，符號本身在輸出時不顯示。<\u002Fp>\n      <div style=\"background:#1A1714; border-radius:8px; padding:24px 28px; margin-bottom:12px;\">\n        <div style=\"font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:#5C5248; margin-bottom:14px;\">語法<\u002Fdiv>\n        <pre style=\"font-family:'JetBrains Mono',monospace; font-size:13.5px; line-height:1.9; color:#E8E0D4;\"><span style=\"color:#C8614A;\">**<\u002Fspan>粗體文字<span style=\"color:#C8614A;\">**<\u002Fspan>\n<span style=\"color:#C8614A;\">*<\u002Fspan>斜體文字<span style=\"color:#C8614A;\">*<\u002Fspan>\n<span style=\"color:#C8614A;\">***<\u002Fspan>粗體加斜體<span style=\"color:#C8614A;\">***<\u002Fspan>\n<span style=\"color:#C8614A;\">~~<\u002Fspan>刪除線<span style=\"color:#C8614A;\">~~<\u002Fspan>\n行內 <span style=\"color:#C8614A;\">`<\u002Fspan>程式碼<span style=\"color:#C8614A;\">`<\u002Fspan> 文字<\u002Fpre>\n      <\u002Fdiv>\n      <div style=\"border:1px solid #DDD8D0; border-radius:8px; padding:24px 28px; background:#fff; display:flex; flex-direction:column; gap:12px;\">\n        <div style=\"font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:#B0A496; margin-bottom:4px;\">渲染結果<\u002Fdiv>\n        <div style=\"font-size:15px; color:#1A1714;\"><strong>粗體文字<\u002Fstrong><\u002Fdiv>\n        <div style=\"font-size:15px; color:#1A1714;\"><em>斜體文字<\u002Fem><\u002Fdiv>\n        <div style=\"font-size:15px; color:#1A1714;\"><strong><em>粗體加斜體<\u002Fem><\u002Fstrong><\u002Fdiv>\n        <div style=\"font-size:15px; color:#1A1714;\"><s>刪除線<\u002Fs><\u002Fdiv>\n        <div style=\"font-size:15px; color:#1A1714;\">行內 <code style=\"background:#EDE9E1; padding:1px 7px; border-radius:3px; font-family:'JetBrains Mono',monospace; font-size:13px; color:#B34A30;\">程式碼<\u002Fcode> 文字<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ── 引文 ── -->\n    <section id=\"blockquote\" style=\"margin-bottom:72px;\">\n      <div style=\"font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:#C8614A; margin-bottom:12px;\">04<\u002Fdiv>\n      <h2 style=\"font-family:'Lora',serif; font-size:28px; font-weight:700; color:#1A1714; margin-bottom:16px; letter-spacing:-0.015em;\">引文<\u002Fh2>\n      <p style=\"font-size:18px; color:#4A3F36; margin-bottom:20px; line-height:1.85;\">在行首加上 <code style=\"background:#EDE9E1; padding:1px 6px; border-radius:3px; font-family:'JetBrains Mono',monospace; font-size:13px;\">&gt;<\u002Fcode> 建立引文，可以多層巢狀，也可在引文內使用其他 Markdown 語法。<\u002Fp>\n      <div style=\"background:#1A1714; border-radius:8px; padding:24px 28px; margin-bottom:12px;\">\n        <pre style=\"font-family:'JetBrains Mono',monospace; font-size:13.5px; line-height:1.9; color:#E8E0D4;\"><span style=\"color:#C8614A;\">&gt; <\u002Fspan>這是一段引文。\n<span style=\"color:#C8614A;\">&gt; <\u002Fspan>同一段引文可跨越多行。\n<span style=\"color:#C8614A;\">&gt;<\u002Fspan>\n<span style=\"color:#C8614A;\">&gt; &gt; <\u002Fspan>這是巢狀引文。<\u002Fpre>\n      <\u002Fdiv>\n      <div style=\"border:1px solid #DDD8D0; border-radius:8px; padding:24px 28px; background:#fff;\">\n        <div style=\"font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:#B0A496; margin-bottom:16px;\">渲染結果<\u002Fdiv>\n        <div style=\"border-left:2px solid #C8614A; padding:12px 20px; background:#FBF7F5; border-radius:0 4px 4px 0; margin-bottom:0;\">\n          <p style=\"font-size:15px; color:#4A3F36; font-style:italic; margin-bottom:8px;\">這是一段引文。<br>同一段引文可跨越多行。<\u002Fp>\n          <div style=\"border-left:2px solid #DDCCC6; padding:10px 16px; background:#F7F2F0; border-radius:0 4px 4px 0;\">\n            <p style=\"font-size:14px; color:#5C4F44; font-style:italic;\">這是巢狀引文。<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ── 清單 ── -->\n    <section id=\"lists\" style=\"margin-bottom:72px;\">\n      <div style=\"font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:#C8614A; margin-bottom:12px;\">05<\u002Fdiv>\n      <h2 style=\"font-family:'Lora',serif; font-size:28px; font-weight:700; color:#1A1714; margin-bottom:16px; letter-spacing:-0.015em;\">清單<\u002Fh2>\n      <p style=\"font-size:18px; color:#4A3F36; margin-bottom:20px; line-height:1.85;\">支援無序清單（<code style=\"background:#EDE9E1; padding:1px 6px; border-radius:3px; font-family:'JetBrains Mono',monospace; font-size:13px;\">-<\u002Fcode> 或 <code style=\"background:#EDE9E1; padding:1px 6px; border-radius:3px; font-family:'JetBrains Mono',monospace; font-size:13px;\">*<\u002Fcode>）與有序清單（<code style=\"background:#EDE9E1; padding:1px 6px; border-radius:3px; font-family:'JetBrains Mono',monospace; font-size:13px;\">1.<\u002Fcode>），以縮排建立巢狀結構。<\u002Fp>\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:16px;\">\n        <div>\n          <div style=\"font-size:11.5px; font-weight:500; color:#8B7F72; margin-bottom:8px;\">無序清單<\u002Fdiv>\n          <div style=\"background:#1A1714; border-radius:8px; padding:20px 22px; margin-bottom:10px;\">\n            <pre style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; line-height:1.9; color:#E8E0D4;\"><span style=\"color:#C8614A;\">- <\u002Fspan>項目一\n<span style=\"color:#C8614A;\">- <\u002Fspan>項目二\n  <span style=\"color:#C8614A;\">- <\u002Fspan>子項目\n  <span style=\"color:#C8614A;\">- <\u002Fspan>子項目\n<span style=\"color:#C8614A;\">- <\u002Fspan>項目三<\u002Fpre>\n          <\u002Fdiv>\n          <div style=\"border:1px solid #DDD8D0; border-radius:8px; padding:18px 22px; background:#fff;\">\n            <ul style=\"font-size:14px; color:#1A1714; padding-left:18px; line-height:2.1; list-style-type:disc;\">\n              <li>項目一<\u002Fli>\n              <li>項目二<ul style=\"padding-left:16px; list-style-type:circle;\"><li>子項目<\u002Fli><li>子項目<\u002Fli><\u002Ful><\u002Fli>\n              <li>項目三<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:11.5px; font-weight:500; color:#8B7F72; margin-bottom:8px;\">有序清單<\u002Fdiv>\n          <div style=\"background:#1A1714; border-radius:8px; padding:20px 22px; margin-bottom:10px;\">\n            <pre style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; line-height:1.9; color:#E8E0D4;\"><span style=\"color:#C8614A;\">1. <\u002Fspan>步驟一\n<span style=\"color:#C8614A;\">2. <\u002Fspan>步驟二\n   <span style=\"color:#C8614A;\">1. <\u002Fspan>子步驟\n   <span style=\"color:#C8614A;\">2. <\u002Fspan>子步驟\n<span style=\"color:#C8614A;\">3. <\u002Fspan>步驟三<\u002Fpre>\n          <\u002Fdiv>\n          <div style=\"border:1px solid #DDD8D0; border-radius:8px; padding:18px 22px; background:#fff;\">\n            <ol style=\"font-size:14px; color:#1A1714; padding-left:18px; line-height:2.1;\">\n              <li>步驟一<\u002Fli>\n              <li>步驟二<ol style=\"padding-left:16px;\"><li>子步驟<\u002Fli><li>子步驟<\u002Fli><\u002Fol><\u002Fli>\n              <li>步驟三<\u002Fli>\n            <\u002Fol>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ── 程式碼 ── -->\n    <section id=\"code\" style=\"margin-bottom:72px;\">\n      <div style=\"font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:#C8614A; margin-bottom:12px;\">06<\u002Fdiv>\n      <h2 style=\"font-family:'Lora',serif; font-size:28px; font-weight:700; color:#1A1714; margin-bottom:16px; letter-spacing:-0.015em;\">程式碼<\u002Fh2>\n      <p style=\"font-size:18px; color:#4A3F36; margin-bottom:20px; line-height:1.85;\">反引號 <code style=\"background:#EDE9E1; padding:1px 6px; border-radius:3px; font-family:'JetBrains Mono',monospace; font-size:13px;\">`<\u002Fcode> 包圍行內程式碼；三個反引號 <code style=\"background:#EDE9E1; padding:1px 6px; border-radius:3px; font-family:'JetBrains Mono',monospace; font-size:13px;\">```<\u002Fcode> 開啟程式碼區塊，可在開頭指定語言以啟用語法高亮。<\u002Fp>\n      <div style=\"background:#1A1714; border-radius:8px; padding:24px 28px; margin-bottom:12px;\">\n        <div style=\"font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:#5C5248; margin-bottom:14px;\">語法<\u002Fdiv>\n        <pre style=\"font-family:'JetBrains Mono',monospace; font-size:13.5px; line-height:1.8; color:#E8E0D4;\">行內：<span style=\"color:#C8614A;\">`<\u002Fspan>const x = 42<span style=\"color:#C8614A;\">`<\u002Fspan>\n\n<span style=\"color:#C8614A;\">```<\u002Fspan><span style=\"color:#8FC97E;\">python<\u002Fspan>\n<span style=\"color:#7DB8E8;\">def<\u002Fspan> <span style=\"color:#E8C96A;\">greet<\u002Fspan>(name):\n    <span style=\"color:#7DB8E8;\">return<\u002Fspan> <span style=\"color:#C8614A;\">f\"Hello, {name}!\"<\u002Fspan>\n<span style=\"color:#C8614A;\">```<\u002Fspan><\u002Fpre>\n      <\u002Fdiv>\n      <div style=\"border:1px solid #DDD8D0; border-radius:8px; overflow:hidden; background:#fff;\">\n        <div style=\"padding:18px 24px; border-bottom:1px solid #DDD8D0;\">\n          <div style=\"font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:#B0A496; margin-bottom:10px;\">行內程式碼<\u002Fdiv>\n          <p style=\"font-size:15px; color:#4A3F36;\">使用 <code style=\"background:#EDE9E1; padding:1px 7px; border-radius:3px; font-family:'JetBrains Mono',monospace; font-size:13px; color:#B34A30;\">const x = 42<\u002Fcode> 宣告常數。<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#1A1714; padding:20px 24px;\">\n          <div style=\"font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:#5C5248; margin-bottom:12px;\">python<\u002Fdiv>\n          <pre style=\"font-family:'JetBrains Mono',monospace; font-size:13.5px; line-height:1.85; color:#E8E0D4;\"><span style=\"color:#7DB8E8;\">def<\u002Fspan> <span style=\"color:#E8C96A;\">greet<\u002Fspan>(name):\n    <span style=\"color:#7DB8E8;\">return<\u002Fspan> <span style=\"color:#C8614A;\">f\"Hello, {name}!\"<\u002Fspan><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ── 連結 ── -->\n    <section id=\"links\" style=\"margin-bottom:72px;\">\n      <div style=\"font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:#C8614A; margin-bottom:12px;\">07<\u002Fdiv>\n      <h2 style=\"font-family:'Lora',serif; font-size:28px; font-weight:700; color:#1A1714; margin-bottom:16px; letter-spacing:-0.015em;\">連結<\u002Fh2>\n      <p style=\"font-size:18px; color:#4A3F36; margin-bottom:20px; line-height:1.85;\">使用 <code style=\"background:#EDE9E1; padding:1px 6px; border-radius:3px; font-family:'JetBrains Mono',monospace; font-size:13px;\">[顯示文字](網址)<\u002Fcode> 格式建立超連結，可附加 <code style=\"background:#EDE9E1; padding:1px 6px; border-radius:3px; font-family:'JetBrains Mono',monospace; font-size:13px;\">\"title\"<\u002Fcode> 屬性，或用角括號建立自動連結。<\u002Fp>\n      <div style=\"background:#1A1714; border-radius:8px; padding:24px 28px; margin-bottom:12px;\">\n        <pre style=\"font-family:'JetBrains Mono',monospace; font-size:13.5px; line-height:1.9; color:#E8E0D4;\"><span style=\"color:#7DB8E8;\">[<\u002Fspan>Anthropic<span style=\"color:#7DB8E8;\">]<\u002Fspan>(https://anthropic.com)\n<span style=\"color:#7DB8E8;\">[<\u002Fspan>附標題的連結<span style=\"color:#7DB8E8;\">]<\u002Fspan>(https://example.com <span style=\"color:#C8614A;\">\"這是 title\"<\u002Fspan>)\n&lt;https://example.com&gt;   <span style=\"color:#5C5248;\">← 自動連結<\u002Fspan><\u002Fpre>\n      <\u002Fdiv>\n      <div style=\"border:1px solid #DDD8D0; border-radius:8px; padding:22px 28px; background:#fff; display:flex; flex-direction:column; gap:12px;\">\n        <div style=\"font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:#B0A496; margin-bottom:4px;\">渲染結果<\u002Fdiv>\n        <div style=\"font-size:15px;\"><a href=\"#\" style=\"color:#C8614A; text-decoration:underline; text-underline-offset:3px;\">Anthropic<\u002Fa><\u002Fdiv>\n        <div style=\"font-size:15px;\"><a href=\"#\" title=\"這是 title\" style=\"color:#C8614A; text-decoration:underline; text-underline-offset:3px;\">附標題的連結<\u002Fa><\u002Fdiv>\n        <div style=\"font-size:15px;\"><a href=\"#\" style=\"color:#C8614A; text-decoration:underline; text-underline-offset:3px;\">https://example.com<\u002Fa><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ── 圖片 ── -->\n    <section id=\"images\" style=\"margin-bottom:72px;\">\n      <div style=\"font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:#C8614A; margin-bottom:12px;\">08<\u002Fdiv>\n      <h2 style=\"font-family:'Lora',serif; font-size:28px; font-weight:700; color:#1A1714; margin-bottom:16px; letter-spacing:-0.015em;\">圖片<\u002Fh2>\n      <p style=\"font-size:18px; color:#4A3F36; margin-bottom:20px; line-height:1.85;\">語法與連結相同，差別在於前面加上驚嘆號 <code style=\"background:#EDE9E1; padding:1px 6px; border-radius:3px; font-family:'JetBrains Mono',monospace; font-size:13px;\">!<\u002Fcode>。方括號內的文字作為無法顯示圖片時的替代文字（alt text）。<\u002Fp>\n      <div style=\"background:#1A1714; border-radius:8px; padding:24px 28px; margin-bottom:12px;\">\n        <pre style=\"font-family:'JetBrains Mono',monospace; font-size:13.5px; line-height:1.9; color:#E8E0D4;\"><span style=\"color:#C8614A;\">!<\u002Fspan><span style=\"color:#7DB8E8;\">[<\u002Fspan>替代文字<span style=\"color:#7DB8E8;\">]<\u002Fspan>(圖片路徑或網址)\n<span style=\"color:#C8614A;\">!<\u002Fspan><span style=\"color:#7DB8E8;\">[<\u002Fspan>替代文字<span style=\"color:#7DB8E8;\">]<\u002Fspan>(圖片路徑 <span style=\"color:#C8614A;\">\"圖片標題\"<\u002Fspan>)\n\n<span style=\"color:#5C5248;\">可點擊的圖片（圖片連結）<\u002Fspan>\n<span style=\"color:#7DB8E8;\">[<\u002Fspan><span style=\"color:#C8614A;\">!<\u002Fspan>[alt](圖片路徑)<span style=\"color:#7DB8E8;\">]<\u002Fspan>(連結網址)<\u002Fpre>\n      <\u002Fdiv>\n      <div style=\"border:1px solid #DDD8D0; border-radius:8px; padding:22px 28px; background:#fff;\">\n        <div style=\"font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:#B0A496; margin-bottom:14px;\">示意<\u002Fdiv>\n        <div style=\"background:repeating-linear-gradient(45deg, #F0EDE6, #F0EDE6 8px, #E8E3DA 8px, #E8E3DA 16px); border-radius:4px; height:88px; display:flex; align-items:center; justify-content:center;\">\n          <span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#8B7F72;\">[ image placeholder ]<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-size:12px; color:#B0A496; margin-top:10px;\">圖片無法載入時顯示替代文字（alt text）。<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ── 表格 ── -->\n    <section id=\"tables\" style=\"margin-bottom:72px;\">\n      <div style=\"font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:#C8614A; margin-bottom:12px;\">09<\u002Fdiv>\n      <h2 style=\"font-family:'Lora',serif; font-size:28px; font-weight:700; color:#1A1714; margin-bottom:16px; letter-spacing:-0.015em;\">表格<\u002Fh2>\n      <p style=\"font-size:18px; color:#4A3F36; margin-bottom:20px; line-height:1.85;\">以 <code style=\"background:#EDE9E1; padding:1px 6px; border-radius:3px; font-family:'JetBrains Mono',monospace; font-size:13px;\">|<\u002Fcode> 分隔欄位；第二行用 <code style=\"background:#EDE9E1; padding:1px 6px; border-radius:3px; font-family:'JetBrains Mono',monospace; font-size:13px;\">---<\u002Fcode> 分隔表頭與內容，冒號位置決定對齊方式。<\u002Fp>\n      <div style=\"background:#1A1714; border-radius:8px; padding:24px 28px; margin-bottom:12px;\">\n        <pre style=\"font-family:'JetBrains Mono',monospace; font-size:13.5px; line-height:1.9; color:#E8E0D4;\">| 語言       | 年份 | 特色             |\n| <span style=\"color:#C8614A;\">:---<\u002Fspan>       | <span style=\"color:#C8614A;\">:---:<\u002Fspan>| <span style=\"color:#C8614A;\">---:<\u002Fspan>             |\n| Python     | 1991 | 簡潔、資料科學   |\n| JavaScript | 1995 | 全端、生態豐富   |\n| Go         | 2009 | 高效能、雲原生   |\n\n<span style=\"color:#5C5248;\">左對齊    置中對齊   右對齊<\u002Fspan><\u002Fpre>\n      <\u002Fdiv>\n      <div style=\"border:1px solid #DDD8D0; border-radius:8px; overflow:hidden; background:#fff;\">\n        <table style=\"width:100%; border-collapse:collapse; font-size:14px;\">\n          <thead>\n            <tr style=\"background:#F0EDE6; border-bottom:1px solid #DDD8D0;\">\n              <th style=\"text-align:left; padding:11px 24px; font-weight:600; color:#1A1714; font-size:13px; letter-spacing:0.01em;\">語言<\u002Fth>\n              <th style=\"text-align:center; padding:11px 24px; font-weight:600; color:#1A1714; font-size:13px;\">年份<\u002Fth>\n              <th style=\"text-align:right; padding:11px 24px; font-weight:600; color:#1A1714; font-size:13px;\">特色<\u002Fth>\n            <\u002Ftr>\n          <\u002Fthead>\n          <tbody>\n            <tr style=\"border-bottom:1px solid #E8E3DA;\">\n              <td style=\"text-align:left; padding:11px 24px; color:#4A3F36;\">Python<\u002Ftd>\n              <td style=\"text-align:center; padding:11px 24px; color:#4A3F36;\">1991<\u002Ftd>\n              <td style=\"text-align:right; padding:11px 24px; color:#4A3F36;\">簡潔、資料科學<\u002Ftd>\n            <\u002Ftr>\n            <tr style=\"border-bottom:1px solid #E8E3DA; background:#FDFCFA;\">\n              <td style=\"text-align:left; padding:11px 24px; color:#4A3F36;\">JavaScript<\u002Ftd>\n              <td style=\"text-align:center; padding:11px 24px; color:#4A3F36;\">1995<\u002Ftd>\n              <td style=\"text-align:right; padding:11px 24px; color:#4A3F36;\">全端、生態豐富<\u002Ftd>\n            <\u002Ftr>\n            <tr>\n              <td style=\"text-align:left; padding:11px 24px; color:#4A3F36;\">Go<\u002Ftd>\n              <td style=\"text-align:center; padding:11px 24px; color:#4A3F36;\">2009<\u002Ftd>\n              <td style=\"text-align:right; padding:11px 24px; color:#4A3F36;\">高效能、雲原生<\u002Ftd>\n            <\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ── 任務清單 ── -->\n    <section id=\"checkbox\" style=\"margin-bottom:72px;\">\n      <div style=\"font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:#C8614A; margin-bottom:12px;\">10<\u002Fdiv>\n      <h2 style=\"font-family:'Lora',serif; font-size:28px; font-weight:700; color:#1A1714; margin-bottom:16px; letter-spacing:-0.015em;\">任務清單<\u002Fh2>\n      <p style=\"font-size:18px; color:#4A3F36; margin-bottom:20px; line-height:1.85;\">在清單項目後加入 <code style=\"background:#EDE9E1; padding:1px 6px; border-radius:3px; font-family:'JetBrains Mono',monospace; font-size:13px;\">[ ]<\u002Fcode>（未完成）或 <code style=\"background:#EDE9E1; padding:1px 6px; border-radius:3px; font-family:'JetBrains Mono',monospace; font-size:13px;\">[x]<\u002Fcode>（已完成）建立可勾選的任務清單。<\u002Fp>\n      <div style=\"background:#1A1714; border-radius:8px; padding:24px 28px; margin-bottom:12px;\">\n        <pre style=\"font-family:'JetBrains Mono',monospace; font-size:13.5px; line-height:1.9; color:#E8E0D4;\"><span style=\"color:#C8614A;\">- [x]<\u002Fspan> 學習 Markdown 基礎語法\n<span style=\"color:#C8614A;\">- [x]<\u002Fspan> 了解標題與文字格式\n<span style=\"color:#C8614A;\">- [ ]<\u002Fspan> 練習建立表格\n<span style=\"color:#C8614A;\">- [ ]<\u002Fspan> 嘗試數學公式語法<\u002Fpre>\n      <\u002Fdiv>\n      <div style=\"border:1px solid #DDD8D0; border-radius:8px; padding:22px 28px; background:#fff; display:flex; flex-direction:column; gap:11px;\">\n        <div style=\"font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:#B0A496; margin-bottom:4px;\">渲染結果<\u002Fdiv>\n        <label style=\"display:flex; align-items:center; gap:10px; font-size:15px; color:#1A1714; cursor:pointer;\"><input type=\"checkbox\" checked=\"\" style=\"width:15px; height:15px; accent-color:#C8614A; cursor:pointer;\"> 學習 Markdown 基礎語法<\u002Flabel>\n        <label style=\"display:flex; align-items:center; gap:10px; font-size:15px; color:#1A1714; cursor:pointer;\"><input type=\"checkbox\" checked=\"\" style=\"width:15px; height:15px; accent-color:#C8614A; cursor:pointer;\"> 了解標題與文字格式<\u002Flabel>\n        <label style=\"display:flex; align-items:center; gap:10px; font-size:15px; color:#8B7F72; cursor:pointer;\"><input type=\"checkbox\" style=\"width:15px; height:15px; accent-color:#C8614A; cursor:pointer;\"> 練習建立表格<\u002Flabel>\n        <label style=\"display:flex; align-items:center; gap:10px; font-size:15px; color:#8B7F72; cursor:pointer;\"><input type=\"checkbox\" style=\"width:15px; height:15px; accent-color:#C8614A; cursor:pointer;\"> 嘗試數學公式語法<\u002Flabel>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ── 分隔線 ── -->\n    <section id=\"hr\" style=\"margin-bottom:72px;\">\n      <div style=\"font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:#C8614A; margin-bottom:12px;\">11<\u002Fdiv>\n      <h2 style=\"font-family:'Lora',serif; font-size:28px; font-weight:700; color:#1A1714; margin-bottom:16px; letter-spacing:-0.015em;\">分隔線<\u002Fh2>\n      <p style=\"font-size:18px; color:#4A3F36; margin-bottom:20px; line-height:1.85;\">三個以上的 <code style=\"background:#EDE9E1; padding:1px 6px; border-radius:3px; font-family:'JetBrains Mono',monospace; font-size:13px;\">---<\u002Fcode>、<code style=\"background:#EDE9E1; padding:1px 6px; border-radius:3px; font-family:'JetBrains Mono',monospace; font-size:13px;\">***<\u002Fcode> 或 <code style=\"background:#EDE9E1; padding:1px 6px; border-radius:3px; font-family:'JetBrains Mono',monospace; font-size:13px;\">___<\u002Fcode> 渲染為水平分隔線，需單獨一行，前後空行。<\u002Fp>\n      <div style=\"background:#1A1714; border-radius:8px; padding:24px 28px; margin-bottom:12px;\">\n        <pre style=\"font-family:'JetBrains Mono',monospace; font-size:13.5px; line-height:1.9; color:#E8E0D4;\">上方段落\n\n<span style=\"color:#C8614A;\">---<\u002Fspan>\n\n下方段落<\u002Fpre>\n      <\u002Fdiv>\n      <div style=\"border:1px solid #DDD8D0; border-radius:8px; padding:22px 28px; background:#fff;\">\n        <div style=\"font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:#B0A496; margin-bottom:14px;\">渲染結果<\u002Fdiv>\n        <p style=\"font-size:15px; color:#4A3F36; margin-bottom:16px;\">上方段落<\u002Fp>\n        <hr style=\"border:none; border-top:1px solid #DDD8D0; margin-bottom:16px;\">\n        <p style=\"font-size:15px; color:#4A3F36;\">下方段落<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ── 跳脫字元 ── -->\n    <section id=\"escape\" style=\"margin-bottom:72px;\">\n      <div style=\"font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:#C8614A; margin-bottom:12px;\">12<\u002Fdiv>\n      <h2 style=\"font-family:'Lora',serif; font-size:28px; font-weight:700; color:#1A1714; margin-bottom:16px; letter-spacing:-0.015em;\">跳脫字元<\u002Fh2>\n      <p style=\"font-size:18px; color:#4A3F36; margin-bottom:20px; line-height:1.85;\">反斜線 <code style=\"background:#EDE9E1; padding:1px 6px; border-radius:3px; font-family:'JetBrains Mono',monospace; font-size:13px;\">\\<\u002Fcode> 置於特殊符號前，使其以字面字元顯示，不被解析為 Markdown 語法。<\u002Fp>\n      <div style=\"background:#1A1714; border-radius:8px; padding:24px 28px; margin-bottom:12px;\">\n        <pre style=\"font-family:'JetBrains Mono',monospace; font-size:13.5px; line-height:1.9; color:#E8E0D4;\"><span style=\"color:#C8614A;\">\\*<\u002Fspan>不是斜體<span style=\"color:#C8614A;\">\\*<\u002Fspan>\n<span style=\"color:#C8614A;\">\\#<\u002Fspan> 不是標題\n<span style=\"color:#C8614A;\">\\`<\u002Fspan>不是程式碼<span style=\"color:#C8614A;\">\\`<\u002Fspan>\n<span style=\"color:#C8614A;\">\\[<\u002Fspan>不是連結<span style=\"color:#C8614A;\">\\]<\u002Fspan><\u002Fpre>\n      <\u002Fdiv>\n      <div style=\"border:1px solid #DDD8D0; border-radius:8px; padding:22px 28px; background:#fff;\">\n        <div style=\"font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:#B0A496; margin-bottom:14px;\">可跳脫的特殊字元<\u002Fdiv>\n        <div style=\"display:flex; flex-wrap:wrap; gap:8px;\">\n          <sc-for list=\"{{ escChars }}\" as=\"ch\" hint-placeholder-count=\"12\">\n            <code style=\"background:#EDE9E1; border:1px solid #DDD8D0; padding:3px 10px; border-radius:4px; font-family:'JetBrains Mono',monospace; font-size:13px; color:#B34A30;\">{{ ch }}<\u002Fcode>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ── 數學公式 ── -->\n    <section id=\"math\" style=\"margin-bottom:72px;\">\n      <div style=\"font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:#C8614A; margin-bottom:12px;\">13<\u002Fdiv>\n      <h2 style=\"font-family:'Lora',serif; font-size:28px; font-weight:700; color:#1A1714; margin-bottom:16px; letter-spacing:-0.015em;\">數學公式<\u002Fh2>\n      <p style=\"font-size:18px; color:#4A3F36; margin-bottom:20px; line-height:1.85;\">支援 LaTeX 語法的平台（HackMD、Notion、Jupyter）可用 <code style=\"background:#EDE9E1; padding:1px 6px; border-radius:3px; font-family:'JetBrains Mono',monospace; font-size:13px;\">$...$<\u002Fcode> 插入行內公式，或 <code style=\"background:#EDE9E1; padding:1px 6px; border-radius:3px; font-family:'JetBrains Mono',monospace; font-size:13px;\">$$...$$<\u002Fcode> 建立獨立公式區塊。<\u002Fp>\n      <div style=\"background:#1A1714; border-radius:8px; padding:24px 28px; margin-bottom:12px;\">\n        <pre style=\"font-family:'JetBrains Mono',monospace; font-size:13.5px; line-height:1.9; color:#E8E0D4;\">行內：<span style=\"color:#C8614A;\">$<\u002Fspan>E = mc^2<span style=\"color:#C8614A;\">$<\u002Fspan>\n\n區塊：\n<span style=\"color:#C8614A;\">$$<\u002Fspan>\n\\int_{-\\infty}^{\\infty} e^{-x^2}\\,dx = \\sqrt{\\pi}\n<span style=\"color:#C8614A;\">$$<\u002Fspan><\u002Fpre>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:16px;\">\n        <div style=\"border:1px solid #DDD8D0; border-radius:8px; padding:16px 20px; background:#fff;\">\n          <div style=\"font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:#B0A496; margin-bottom:10px;\">上下標<\u002Fdiv>\n          <div style=\"font-size:19px; color:#1A1714; font-family:Georgia,serif;\">x<sup style=\"font-size:12px;\">2<\u002Fsup> + y<sub style=\"font-size:12px;\">i<\u002Fsub><\u002Fdiv>\n          <code style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#8B7F72; margin-top:8px; display:block;\">x^2 + y_i<\u002Fcode>\n        <\u002Fdiv>\n        <div style=\"border:1px solid #DDD8D0; border-radius:8px; padding:16px 20px; background:#fff;\">\n          <div style=\"font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:#B0A496; margin-bottom:10px;\">分數<\u002Fdiv>\n          <div style=\"font-size:19px; color:#1A1714; font-family:Georgia,serif;\"><sup>a+b<\u002Fsup>/<sub>c<\u002Fsub><\u002Fdiv>\n          <code style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#8B7F72; margin-top:8px; display:block;\">\\frac{`{`}a+b{`}`}{c}<\u002Fcode>\n        <\u002Fdiv>\n        <div style=\"border:1px solid #DDD8D0; border-radius:8px; padding:16px 20px; background:#fff;\">\n          <div style=\"font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:#B0A496; margin-bottom:10px;\">著名公式<\u002Fdiv>\n          <div style=\"font-size:17px; color:#1A1714; font-family:Georgia,serif; font-style:italic;\">E = mc²<\u002Fdiv>\n          <code style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#8B7F72; margin-top:8px; display:block;\">E = mc^2<\u002Fcode>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#EDE9E1; border-radius:6px; padding:14px 18px;\">\n        <div style=\"font-size:11.5px; font-weight:500; color:#8B7F72; margin-bottom:8px;\">常用 LaTeX 符號<\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; color:#5C4F44; line-height:1.9;\">\\alpha  \\beta  \\gamma  \\delta  \\sum  \\int  \\infty  \\sqrt{'{'}x{'}'}  \\frac{'{'}a{'}'}{'{'}b{'}'}  \\pm  \\leq  \\geq  \\neq<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- Conclusion -->\n    <div style=\"border:1px solid #DDD8D0; border-radius:8px; padding:48px 52px; background:#fff; text-align:center;\">\n      <div style=\"width:40px; height:2px; background:#C8614A; margin:0 auto 28px;\"><\u002Fdiv>\n      <h2 style=\"font-family:'Lora',serif; font-size:26px; font-weight:700; color:#1A1714; margin-bottom:14px; letter-spacing:-0.015em;\">掌握 Markdown，提升寫作效率<\u002Fh2>\n      <p style=\"font-size:15px; color:#5C4F44; max-width:440px; margin:0 auto 32px; line-height:1.85; font-weight:300;\">看到這裡，您已具備在 GitHub、Notion、HackMD 等平台上流暢使用 Markdown 的基礎。最好的學習方式是立即動手練習。<\u002Fp>\n      <div style=\"display:flex; justify-content:center; gap:32px; flex-wrap:wrap;\">\n        <div style=\"text-align:center;\">\n          <div style=\"font-family:'Lora',serif; font-size:22px; font-weight:700; color:#1A1714;\">13<\u002Fdiv>\n          <div style=\"font-size:11.5px; color:#8B7F72; margin-top:2px; text-transform:uppercase; letter-spacing:0.06em;\">語法章節<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"width:1px; background:#DDD8D0;\"><\u002Fdiv>\n        <div style=\"text-align:center;\">\n          <div style=\"font-family:'Lora',serif; font-size:22px; font-weight:700; color:#1A1714;\">10 min<\u002Fdiv>\n          <div style=\"font-size:11.5px; color:#8B7F72; margin-top:2px; text-transform:uppercase; letter-spacing:0.06em;\">上手時間<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"width:1px; background:#DDD8D0;\"><\u002Fdiv>\n        <div style=\"text-align:center;\">\n          <div style=\"font-family:'Lora',serif; font-size:22px; font-weight:700; color:#1A1714;\">∞<\u002Fdiv>\n          <div style=\"font-size:11.5px; color:#8B7F72; margin-top:2px; text-transform:uppercase; letter-spacing:0.06em;\">應用場景<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() {\n    return {\n      escChars: ['\\\\\\\\', '\\\\`', '\\\\*', '\\\\_', '\\\\{', '\\\\}', '\\\\[', '\\\\]', '\\\\(', '\\\\)', '\\\\#', '\\\\+', '\\\\-', '\\\\.', '\\\\!']\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
