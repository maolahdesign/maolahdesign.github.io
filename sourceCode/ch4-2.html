<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
 "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html>
<head>
<title>String formatting methods</title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
</head>
<body>
<script type="text/javascript">
//<![CDATA[

var testString = new String("我也會 javascript!");
//var testString = "我也會 javascript!";

document.writeln(testString.big()+"<br />");
document.writeln(testString.blink()+"<br />");
document.writeln(testString.sup()+"<br />");
document.writeln(testString.strike()+"<br />");
document.writeln(testString.bold()+"<br />");
document.writeln(testString.italics()+"<br />");
document.writeln(testString.small()+"<br />");

document.writeln(testString.link('http://d-practice.com'));
//]]>
</script>
</body>
</html>
