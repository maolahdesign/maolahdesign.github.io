<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" 
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html>
<head>
<title>Identity and Equality</title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<script type="text/javascript">
//<![CDATA[

var number = "3.3";
var number2 = 3.3;

if (number2 == "3.3") alert("According to equality, value is 3.3");

if (number2 === "3.3") alert("According to identity, value is 3.3");

if (number != 3.3) alert ("According to equality, value is not 3.3");

if (number !== 3.3) alert ("According to identity, value is not 3.3");

//]]>
</script>
</head>
<body>
<p>Some page content</p>
</body>
</html>
