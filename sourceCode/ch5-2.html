function myFunc(theObject) {

function alterArgs(strLiteral, aryObject) {
   strLiteral += "少騙人了";
   aryObject[aryObject.length] = "three";
   
   return strLiteral;
}

var str = "我也會javascript";
var ary = new Array("hello","javascript");

//先呼叫函式
alterArgs(str,ary);

var str2 = alterArgs(str,ary);
document.writeln("跟你說：" + str + "<br /> ");
