<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Register form</title>
	<style>
		input[type=text]{width: 20em;}
	</style>
	<link rel="stylesheet" href="style.css">
	<script type='text/javascript' src='form.js'></script>
</head>
<body>
	<form name="test" method="post" action="register.php">
		<dl>
			<dt>username</dt>
				<dd><input type="text" id="username" name="username" value=""></dd>
			<dt>password</dt>
				<dd><input type="password" id="pwd" name="password" placeholder="至少8個字(需包含至少一個大寫字母及特殊字元)" value=""></dd>
			<dt>repassword</dt>
				<dd><input type="password" id="pwd2" name="password2" value=""></dd>
			<dt>email</dt>
				<dd><input type="text" id="email" name="email" placeholder="hello@gmail.com" value=""></dd>
			<dt>phone</dt>
				<dd><input type="text" id="phone" name="phone" placeholder="(886)936-123456" value=""></dd>
			<dt>coding</dt>
				<dd>
					<ul>
						<li><label for="hobby1"><input id="hobby1" name="hobby" type="checkbox" value="javascript">javascript</label></li>
						<li><label for="hobby2"><input id="hobby2" name="hobby" type="checkbox" value="css">css</label></li>
						<li><label for="hobby3"><input id="hobby3" name="hobby" type="checkbox" value="html">html</label></li>
						<li><label for="hobby4"><input id="hobby4" name="hobby" type="checkbox" value="php">php</label></li>
						<li><label for="hobby5"><input id="hobby5" name="hobby" type="checkbox" value="jsp">jsp</label></li>
					</ul>
				</dd>
			<dt>Language</dt>
				<dd>
					<ul>
						<li><label for="lang1"><input id="lang1" name="language" type="radio" value="chinese">Chinese</label></li>
						<li><label for="lang2"><input id="lang2" name="language" type="radio" value="english">English</label></li>
						<li><label for="lang3"><input id="lang3" name="language" type="radio" value="japanese">Japanese</label></li>
						<li><label for="lang4"><input id="lang4" name="language" type="radio" value="French">French</label></li>
						<li><label for="lang5"><input id="lang5" name="language" type="radio" value="italian">Italian</label></li>
					</ul>
				</dd>
			<dt>&nbsp;</dt>
				<dd><button onclick="validateForm()">Submit</button></dd>
		</dl>		
	</form>
</body>
</html>
